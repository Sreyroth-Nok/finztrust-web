<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request a Demo | FinzTrust</title>
  <link rel="icon" href="favicon.ico">
  <link href="style.css" rel="stylesheet">
  <link href="responsive.css" rel="stylesheet">
  <link href="tailwind-patch.css" rel="stylesheet">
  <style>
    /* Demo Page specific scoped patch */
    .demo-btn-nav {
      background-color: #007A53;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 9999px;
      margin-left: 1.5rem;
      font-weight: 600;
      box-shadow: 0 4px 14px 0 rgba(0,122,83,0.39);
      transition: background-color 0.2s, transform 0.2s;
    }
    .demo-btn-nav:hover { background-color: #3b58e6; transform: translateY(-1px); }
    
    .demo-card {
      background: white;
      padding: 2.5rem;
      border-radius: 1.25rem;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .dark .demo-card { background: #1f2937; border-color: #374151; }
    
    .demo-form .form-group { margin-bottom: 1.25rem; }
    .demo-form label {
      display: block;
      font-size: 0.875rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .demo-form .form-control {
      width: 100%;
      padding: 0.875rem;
      border-radius: 0.75rem;
      border: 1px solid #e5e7eb;
      background: white;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .dark .demo-form .form-control { background: #374151; border-color: #4b5563; }
    .demo-form .form-control:focus { outline: none; border-color: #007A53; }
    
    .demo-submit {
      width: 100%;
      padding: 1rem;
      border-radius: 0.75rem;
      background-color: #007A53;
      color: white;
      font-weight: 700;
      font-size: 1.125rem;
      box-shadow: 0 10px 15px -3px rgba(0,122,83,0.3);
      cursor: pointer;
      transition: background-color 0.2s, transform 0.2s;
      border: none;
      margin-top: 1rem;
    }
    .demo-submit:hover { background-color: #1aab55; transform: translateY(-2px); }
    
    .demo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
</head>
<body x-data="{ page: 'demo', 'darkMode': true, 'stickyMenu': false, 'navigationOpen': false, 'scrollTop': false }"
  x-init="darkMode = JSON.parse(localStorage.getItem('darkMode')); $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
  :class="{'b eh': darkMode === true}">
  
  <script src="shared-header.js"></script>
  <main>
    <section class="ji gp uq 2xl:ud-py-35 pg">
      <div class="bb ze ki xn wq">
        <div class="tc wf gg qq items-center">
          <div class="animate_left jn/2">
            <h4 class="ek yj mk gb">The Demo Engine</h4>
            <h1 class="fk vj zp pr kk wm qb">Request a Personalized Demo</h1>
            <p class="uo">Capture the future of your financial institution. Our consultants will listen to your challenges and provide complete CBS support.</p>
          </div>
          <div class="animate_right jn/2">
            <div class="demo-card">
              <form action="#!" class="demo-form">
                <div class="form-group">
                  <label>Your Name</label>
                  <input type="text" class="form-control" required />
                </div>
                <div class="form-group">
                  <label>Institution Name</label>
                  <input type="text" class="form-control" required />
                </div>
                <div class="demo-row">
                  <div class="form-group">
                    <label>Your Role</label>
                    <select class="form-control">
                      <option>CEO</option>
                      <option>Operations Manager</option>
                      <option>IT Director</option>
                      <option>Other</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label>Product Interest</label>
                    <select class="form-control">
                      <option>FinzCore 360</option>
                      <option>RCI App</option>
                      <option>FinzLoan App</option>
                      <option>Complete Ecosystem</option>
                    </select>
                  </div>
                </div>
                <div>
                  <button type="submit" class="demo-submit">Submit Demo Request</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  <script src="shared-footer.js"></script>
  <button class="xc wf xf ie ld vg sr gh tr g sa ta _a" @click="window.scrollTo({top: 0, behavior: 'smooth'})"
    @scroll.window="scrollTop = (window.pageYOffset > 50) ? true : false" :class="{ 'uc' : scrollTop }">
    <svg class="uh se qd" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <path d="M233.4 105.4c12.5-12.5 32.8-12.5 45.3 0l192 192c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L256 173.3 86.6 342.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l192-192z" />
    </svg>
  </button>

  <script defer src="bundle.js"></script>
</body>
</html>
